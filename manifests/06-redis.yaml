# Redis 7 — Red Hat / SCLORG base image.
#
# quay.io/sclorg/redis-7-c9s runs as UID 1001 with GID 0, compatible with
# OpenShift's restricted SCC — no anyuid required.
#
# Eneo does not configure Redis authentication in its default setup, so no
# REDIS_PASSWORD is set here. Add one if your security policy requires it
# and set REDIS_PASSWORD in eneo-backend-secret + REDIS_HOST auth config.
#
# Data directory for SCLORG Redis: /var/lib/redis/data
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: eneo-redis
  labels:
    app.kubernetes.io/name: eneo
    app.kubernetes.io/component: redis
spec:
  serviceName: eneo-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: eneo
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eneo
        app.kubernetes.io/component: redis
    spec:
      serviceAccountName: eneo-app
      containers:
        - name: redis
          image: quay.io/sclorg/redis-7-c9s
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/lib/redis/data
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: eneo-redis-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: eneo-redis
  labels:
    app.kubernetes.io/name: eneo
    app.kubernetes.io/component: redis
spec:
  selector:
    app.kubernetes.io/name: eneo
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  type: ClusterIP
