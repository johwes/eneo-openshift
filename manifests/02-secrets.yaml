# WARNING: This file is a template. Replace ALL placeholder values before applying.
# Do NOT commit actual secrets to version control.
#
# Generate values:
#   POSTGRESQL_PASSWORD / POSTGRES_PASSWORD (same value, used by different pods):
#                           openssl rand -base64 32
#   JWT_SECRET:             openssl rand -hex 32
#   URL_SIGNING_KEY:        openssl rand -hex 32
#   ENCRYPTION_KEY:         python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())'
#   ENEO_SUPER_API_KEY:     openssl rand -hex 32
#
# Recommended: manage secrets via HashiCorp Vault, OpenShift Secrets Manager,
# or Sealed Secrets rather than applying this file directly.

---
# Credentials for the PostgreSQL pod (SCLORG image env var names).
# POSTGRESQL_USER becomes the database owner — must match POSTGRES_USER in eneo-backend-secret.
apiVersion: v1
kind: Secret
metadata:
  name: eneo-db-secret
  namespace: eneo
  labels:
    app.kubernetes.io/name: eneo
type: Opaque
stringData:
  POSTGRESQL_USER: "eneo"
  POSTGRESQL_PASSWORD: "REPLACE_WITH_STRONG_PASSWORD"
  POSTGRESQL_DATABASE: "eneo"

---
# Backend secrets — JWT, signing keys, encryption, LLM API keys, sysadmin keys.
# POSTGRES_* values must match the POSTGRESQL_* values in eneo-db-secret.
apiVersion: v1
kind: Secret
metadata:
  name: eneo-backend-secret
  namespace: eneo
  labels:
    app.kubernetes.io/name: eneo
type: Opaque
stringData:
  # Database connection — must match eneo-db-secret
  POSTGRES_USER: "eneo"
  POSTGRES_PASSWORD: "REPLACE_WITH_STRONG_PASSWORD"
  POSTGRES_DB: "eneo"

  # Auth — generate with: openssl rand -hex 32
  JWT_SECRET: "REPLACE_WITH_OPENSSL_RAND_HEX_32"
  URL_SIGNING_KEY: "REPLACE_WITH_OPENSSL_RAND_HEX_32"

  # Required for the admin model-provider UI (encrypts stored API keys) and when
  # FEDERATION_PER_TENANT_ENABLED=true or TENANT_CREDENTIALS_ENABLED=true.
  # Generate with: python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())'
  ENCRYPTION_KEY: "REPLACE_WITH_FERNET_KEY"

  # LLM provider keys — set at least one
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GEMINI_API_KEY: ""
  MISTRAL_API_KEY: ""
  VLLM_API_KEY: ""
  FLUX_API_KEY: ""
  TAVILY_API_KEY: ""

  # Azure OpenAI — all five fields required if using Azure
  AZURE_API_KEY: ""
  AZURE_ENDPOINT: ""
  AZURE_API_BASE: ""
  AZURE_MODEL_DEPLOYMENT: ""

  # Sysadmin API access
  ENEO_SUPER_API_KEY: "REPLACE_WITH_SECURE_KEY"
  ENEO_SUPER_DUPER_API_KEY: ""

  # OIDC client secret (if using single-tenant OIDC mode)
  OIDC_CLIENT_SECRET: ""

---
# Frontend secret — JWT_SECRET must be identical to the value in eneo-backend-secret.
apiVersion: v1
kind: Secret
metadata:
  name: eneo-frontend-secret
  namespace: eneo
  labels:
    app.kubernetes.io/name: eneo
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_WITH_SAME_VALUE_AS_BACKEND"
